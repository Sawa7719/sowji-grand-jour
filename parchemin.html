<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parchemin de Sowji</title>

<style>

body {
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f1a14;
font-family:Georgia, serif;
}


/* Le parchemin */

.parchemin {

width:85%;
max-width:420px;
padding:35px 25px;

background:#f4ead3;

border-radius:10px;

border:4px solid #b08d2c;

box-shadow:
0 0 40px rgba(212,175,55,0.5);

text-align:center;

animation:ouvrir 2s ease;

}


@keyframes ouvrir {

0% {
transform:scaleX(0);
opacity:0;
}

100% {
transform:scaleX(1);
opacity:1;
}

}


h1 {

color:#b08d2c;
font-size:32px;

}


.date {

font-size:20px;
color:#555;
margin-bottom:25px;

}


.message {

font-size:18px;
line-height:1.6;

}


.contenu {

margin-top:30px;

padding:20px;

border-top:1px solid #b08d2c;

}


button {

background:#b08d2c;
color:white;

border:none;

padding:12px 25px;

border-radius:25px;

}

</style>

</head>


<body>


<div class="parchemin">


<h1>📜 Sowji</h1>


<div class="date">
21 juillet 2026
</div>


<div class="message">

✨ Petit mot du jour ✨

<br><br>

Bienvenue dans ton premier souvenir.
Chaque jour jusqu'à ton grand jour,
un petit morceau de bonheur t'attend.

</div>


<div class="contenu">

📸  
<br>
Votre photo / vidéo / musique ici

</div>


<button>
Fermer le parchemin
</button>


</div>


</body>

</html>
