<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sowji – Le chemin vers ton grand jour</title>

<style>

body {
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f7f1e8;
font-family:Georgia, serif;
text-align:center;
color:#5b1622;
}

.coffret {
width:85%;
max-width:420px;
padding:35px 20px;
border-radius:25px;
background:white;
box-shadow:0 0 25px rgba(0,0,0,0.15);
}

h1 {
font-size:45px;
margin-bottom:5px;
}

h2 {
font-weight:normal;
}

input {
width:80%;
padding:15px;
border-radius:25px;
border:1px solid #aaa;
text-align:center;
font-size:16px;
}

button {
margin-top:20px;
padding:15px 30px;
border-radius:30px;
border:none;
background:#c9a227;
color:white;
font-size:16px;
}

.cache {
display:none;
}

.compteur {
font-size:22px;
margin:25px 0;
}

</style>
</head>

<body>

<div class="coffret">

<div id="porte">

<h1>Sowji</h1>

<h2>Le chemin vers ton grand jour</h2>

<p>✨ Entre ton mot secret ✨</p>

<input id="secret" type="password" placeholder="Mot secret">

<br>

<button onclick="ouvrir()">Ouvrir mon coffret</button>

<p id="message"></p>

</div>
<div id="interieur" class="cache">

<h1>✨ Bienvenue Sowji ✨</h1>

<h2>Le chemin vers ton grand jour</h2>

<p>Un petit trésor t’attend chaque jour 💍</p>

<div class="compteur" id="compteur">
Chargement...
</div>

<button>
Découvrir mes coffrets ✨
</button>

</div>


</div>


<script>

function ouvrir() {

let mot = document.getElementById("secret").value;

// REMPLACEZ PAR VOTRE MOT SECRET
let vraiMot = "FOREVER";


if (mot === vraiMot) {

document.getElementById("porte").style.display = "none";

document.getElementById("interieur").style.display = "block";

demarrerCompte();

}

else {

document.getElementById("message").innerHTML =
"🔒 Ce coffret est réservé à Sowji";

}

}


function demarrerCompte(){

let dateMariage = new Date("August 21, 2026 00:00:00").getTime();


setInterval(function(){

let maintenant = new Date().getTime();

let distance = dateMariage - maintenant;


let jours = Math.floor(distance / (1000*60*60*24));

let heures = Math.floor((distance % (1000*60*60*24))/(1000*60*60));

let minutes = Math.floor((distance % (1000*60*60))/(1000*60));

let secondes = Math.floor((distance % (1000*60))/1000);


document.getElementById("compteur").innerHTML =
jours + " jours<br>" +
heures + " heures<br>" +
minutes + " minutes<br>" +
secondes + " secondes";


},1000);

}

</script>

</body>
</html>
