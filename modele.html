<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Une lettre pour Sowji</title>

<style>

body {
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f1a14;
font-family:Georgia, serif;
}


/* Parchemin */

.parchemin {

width:85%;
max-width:420px;

background:#f4ead3;

padding:35px 25px;

border:5px solid #b08d2c;

border-radius:20px;

box-shadow:
0 0 40px rgba(176,141,44,0.5);

text-align:center;

animation:ouvrir 2s ease;

}



@keyframes ouvrir {

0% {
transform:scaleY(0);
opacity:0;
}

100% {
transform:scaleY(1);
opacity:1;
}

}



h1 {

color:#b08d2c;

}



.date {

font-size:20px;

margin:20px;

}



.titre {

color:#b08d2c;

font-size:22px;

}



.lettre {

font-size:18px;

line-height:1.7;

margin-top:20px;

}



.tresor {

margin-top:30px;

padding-top:20px;

border-top:1px solid #b08d2c;

}



.signature {

margin-top:35px;

font-style:italic;

}



</style>

</head>



<body>


<div class="parchemin">


<h1>📜 Une lettre pour Sowji</h1>


<div class="date">

🌸 DATE À REMPLACER 🌸

</div>



<div class="titre">

💌 Petit mot du jour

</div>



<div class="lettre">

Écrire ici le petit mot personnalisé...

</div>



<div class="tresor">

✨ Le petit trésor du jour ✨

<br><br>

📸 Photo  
<br>
🎥 Vidéo  
<br>
🎵 Musique  
<br>
🎁 Surprise

</div>



<div class="signature">

Avec toute mon affection,<br>
gros bisous 💋

</div>



</div>


</body>

</html>
