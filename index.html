<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sowji – Le chemin vers ton grand jour</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f7f1e8;
  font-family: Georgia, serif;
  text-align: center;
  color: #5b1622;
}

.coffret {
  width: 85%;
  max-width: 400px;
  padding: 35px 20px;
  border-radius: 20px;
  background: white;
  box-shadow: 0 0 25px rgba(0,0,0,0.15);
}

h1 {
  font-size: 42px;
  margin-bottom: 5px;
}

h2 {
  font-weight: normal;
}

input {
  width: 80%;
  padding: 15px;
  margin-top: 20px;
  border-radius: 25px;
  border: 1px solid #aaa;
  text-align: center;
  font-size: 16px;
}

button {
  margin-top: 20px;
  padding: 15px 30px;
  border-radius: 30px;
  border: none;
  background: #c9a227;
  color: white;
  font-size: 16px;
}

#message {
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="coffret">

<h1>Sowji</h1>

<h2>Le chemin vers ton grand jour</h2>

<p>✨ Entre ton mot secret ✨</p>

<input id="secret" type="password" placeholder="Mot secret">

<br>

<button onclick="ouvrir()">Ouvrir mon coffret</button>

<p id="message"></p>

</div>


<script>

function ouvrir() {

let mot = document.getElementById("secret").value;

// CHANGEZ LE MOT CI-DESSOUS
let vraiMot = "FOREVER";


if (mot === vraiMot) {

document.getElementById("message").innerHTML =
"✨ Bienvenue Sowji, ton coffret est ouvert ❤️";

} else {

document.getElementById("message").innerHTML =
"🔒 Ce coffret est réservé à Sowji";

}

}

</script>

</body>
</html>
