<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le jardin des lettres de Sowji</title>

<style>

body {
margin:0;
padding:20px;
background:#f4ead3;
font-family:Georgia, serif;
text-align:center;
color:#333;
}

h1 {
font-size:38px;
color:#b08d2c;
}

.sous-titre {
font-size:18px;
margin-bottom:30px;
}

.jardin {
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}


.coffret {

width:80%;
max-width:350px;

padding:25px;

border-radius:30px;

background:white;

box-shadow:0 5px 20px rgba(0,0,0,0.15);

font-size:35px;

cursor:pointer;

transition:transform 0.3s;

}


.coffret:active {

transform:scale(0.95);

}


.date {

font-size:18px;

margin-top:12px;

}


.message {

font-size:15px;

margin-top:8px;

}


</style>

</head>


<body>


<h1>🌸 Le jardin des lettres de Sowji 🌸</h1>


<p class="sous-titre">
Chaque jour, une nouvelle lettre trouve son chemin vers toi 💍
</p>


<div class="jardin" id="jardin">

</div>
<script>

let debut = new Date("July 21, 2026");
let fin = new Date("August 30, 2026");


// Mode test : mettez une date ici si vous voulez tester
// Exemple : new Date("July 21, 2026")
// Laissez null pour la vraie date
let dateTest = null;


let aujourdHui = dateTest || new Date();


let jardin = document.getElementById("jardin");



function formatDate(date){

let options = {
day:"numeric",
month:"long",
year:"numeric"
};

return date.toLocaleDateString("fr-FR", options);

}



function ouvrirLettre(date){

let jour = date.getDate();
let mois = date.getMonth()+1;


if(jour === 21 && mois === 7){

window.location.href = "lettres/21-juillet.html";

}

else {

alert("📜 Cette lettre sera bientôt préparée pour Sowji ✨");

}

}




let dateActuelle = new Date(debut);



while(dateActuelle <= fin){


let jourCarte = new Date(
dateActuelle.getFullYear(),
dateActuelle.getMonth(),
dateActuelle.getDate()
);



let symbole;
let texte;



let aujourdHuiSimple = new Date(
aujourdHui.getFullYear(),
aujourdHui.getMonth(),
aujourdHui.getDate()
);



if(jourCarte > aujourdHuiSimple){

symbole = "🌙";

texte =
"Cette lettre n’est pas encore arrivée…";


}



else if(
jourCarte.getTime() === aujourdHuiSimple.getTime()
){

symbole = "💎";

texte =
"Ta lettre du jour est arrivée ✨";


}



else{

symbole = "🪷";

texte =
"Relire cette lettre ❤️";


}




let carte = document.createElement("div");

carte.className = "coffret";



carte.innerHTML = `

<div>
${symbole}
</div>

<div class="date">
${formatDate(dateActuelle)}
</div>

<div class="message">
${texte}
</div>

`;



carte.onclick = function(){


if(symbole === "🌙"){

alert(
"🌙 Cette lettre n’est pas encore arrivée…\n\nElle trouvera son chemin jusqu’à toi au moment prévu ✨"
);

}


else {

ouvrirLettre(jourCarte);

}


};



jardin.appendChild(carte);



dateActuelle.setDate(
dateActuelle.getDate()+1
);


}



</script>


</body>

</html>
